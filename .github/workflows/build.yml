name: build-touchcam

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check src
      - name: Import smoke test
        run: python -c "import touchcam; print(touchcam.__version__)"

  package:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package + pyinstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller
      - name: Build executable
        run: pyinstaller --noconfirm --clean --name touchcam --onefile scripts/run_touchcam.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: touchcam-${{ matrix.os }}
          path: dist/*
